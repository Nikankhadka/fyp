services:
  mongo:
    build:
      context: ../..
      dockerfile: services/mongo/Dockerfile
    container_name: fyp-mongo-dev
    env_file:
      - ./env/mongo.dev.env.example
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017/admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: fyp-api-dev
    env_file:
      - ./env/api.dev.env.example
    ports:
      - "2900:2900"
    volumes:
      - ../../apps/api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2900/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: fyp-web-dev
    env_file:
      - ./env/web.dev.env.example
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/Home >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo_data_dev:
  api_node_modules:
  web_node_modules:
  web_next_cache:
