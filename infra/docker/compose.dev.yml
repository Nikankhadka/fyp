services:
  mongo:
    build:
      context: ../..
      dockerfile: services/mongo/Dockerfile
    container_name: fyp-mongo-dev
    env_file:
      - ./env/mongo.dev.env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://localhost:27017/admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: fyp-api-dev
    env_file:
      - ./env/api.dev.env
    ports:
      - "2900:2900"
    working_dir: /workspace
    command: >
      sh -lc "CI=true pnpm install --filter @fyp/api... --no-frozen-lockfile &&
      pnpm approve-builds --all &&
      pnpm --filter @fyp/api rebuild bcrypt &&
      pnpm --filter @fyp/api dev"
    volumes:
      - ../../:/workspace
      - api_workspace_node_modules:/workspace/node_modules
      - api_app_node_modules:/workspace/apps/api/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2900/readyz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: fyp-web-dev
    env_file:
      - ./env/web.dev.env
    ports:
      - "3000:3000"
    working_dir: /workspace
    command: >
      sh -lc "CI=true pnpm install --filter @fyp/web... --no-frozen-lockfile &&
      pnpm --filter @fyp/web dev"
    volumes:
      - ../../:/workspace
      - web_workspace_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
      - web_next_cache:/workspace/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/Home >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo_data_dev:
  api_workspace_node_modules:
  api_app_node_modules:
  web_workspace_node_modules:
  web_app_node_modules:
  web_next_cache:
