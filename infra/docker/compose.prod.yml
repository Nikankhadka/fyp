services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: runner
    container_name: fyp-api
    env_file:
      - ./env/api.prod.env.example
    restart: unless-stopped
    ports:
      - "2900:2900"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2900/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        API_BASE_URL: http://api:2900
        NEXT_PUBLIC_API_BASE_URL: http://localhost:2900
    container_name: fyp-web
    env_file:
      - ./env/web.prod.env.example
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/Home >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
